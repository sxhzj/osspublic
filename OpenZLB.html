<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <title>访问中...</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .box {
      width: min(100%, 440px);
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
      padding: 24px 18px 18px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1677ff, #4ea1ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -1px;
      box-shadow: 0 8px 20px rgba(22, 119, 255, .22);
    }
    .title {
      font-size: 20px;
      line-height: 1.35;
      font-weight: 800;
      margin: 6px 0 10px;
    }
    .tip {
      font-size: 14px;
      line-height: 1.7;
      color: #667085;
      margin: 0 0 18px;
      word-break: break-word;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 12px 16px;
      border: 0;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .08s ease, opacity .2s ease;
    }
    .btn:active { transform: scale(.99); }
    .btn-primary {
      background: #1677ff;
      color: #fff;
      box-shadow: 0 8px 18px rgba(22, 119, 255, .18);
    }
    .btn-secondary {
      margin-top: 10px;
      background: #eef4ff;
      color: #165dff;
    }
    .status {
      margin-top: 14px;
      font-size: 13px;
      color: #98a2b3;
      min-height: 20px;
    }
    .url {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 12px;
      color: #475467;
      word-break: break-all;
      text-align: left;
      border: 1px solid #eef2f7;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">W</div>
    <div class="title">仅支持在工作地的网络环境内使用</div>
    <div class="tip" id="tip">页面将先尝试打开，2 秒后将自动跳转。</div>

    <a id="openBtn" class="btn btn-primary" href="javascript:void(0)">手动打开</a>
    <button id="copyBtn" class="btn btn-secondary" type="button">复制链接</button>

    <div class="status" id="status">等待跳转...</div>
    <div class="url" id="urlText"></div>
  </div>

<script>
  const targetUrl = "http://192.168.1.8:18002/?key=dingtalk";
  const tip = document.getElementById("tip");
  const statusEl = document.getElementById("status");
  const urlText = document.getElementById("urlText");
  const openBtn = document.getElementById("openBtn");
  const copyBtn = document.getElementById("copyBtn");

  urlText.textContent = targetUrl;

  let jumped = false;
  let fallbackTimer = null;

  function jumpNow() {
    if (jumped) return;
    jumped = true;
    statusEl.textContent = "正在打开...";
    
    try {
      if (window.dd && typeof window.dd.openLink === "function") {
        window.dd.openLink({ url: targetUrl });
        return;
      }
      if (window.dd && window.dd.biz && window.dd.biz.util && typeof window.dd.biz.util.openLink === "function") {
        window.dd.biz.util.openLink({ url: targetUrl });
        return;
      }
    } catch (e) {}

    location.assign(targetUrl);
  }

  function startFlow() {
    // 先尝试立刻打开
    jumpNow();

    // 2 秒后无条件再跳一次，确保进入
    fallbackTimer = setTimeout(() => {
      if (!jumped) {
        window.location.href = targetUrl;
      }
    }, 2000);
  }

  openBtn.addEventListener("click", function (e) {
    e.preventDefault();
    jumpNow();
  });

  copyBtn.addEventListener("click", async function () {
    try {
      await navigator.clipboard.writeText(targetUrl);
      statusEl.textContent = "链接已复制";
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = targetUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      statusEl.textContent = "链接已复制";
    }
  });

  // 页面加载后立即执行
  startFlow();
</script>

  <script>
  const targetUrl = "http://192.168.1.8:18002/?key=dingtalk";
  const tip = document.getElementById("tip");
  const statusEl = document.getElementById("status");
  const urlText = document.getElementById("urlText");
  const openBtn = document.getElementById("openBtn");
  const copyBtn = document.getElementById("copyBtn");

  urlText.textContent = targetUrl;

  let jumped = false;

  function jumpNow() {
    if (jumped) return;
    jumped = true;
    statusEl.textContent = "正在打开...";

    try {
      if (window.dd && typeof window.dd.openLink === "function") {
        window.dd.openLink({ url: targetUrl });
        return;
      }
      if (window.dd && window.dd.biz && window.dd.biz.util && typeof window.dd.biz.util.openLink === "function") {
        window.dd.biz.util.openLink({ url: targetUrl });
        return;
      }
    } catch (e) {}

    window.location.href = targetUrl;
  }

  // 倒计时逻辑
  function startCountdown() {
    let count = 2;

    function update() {
      tip.textContent = `当前环境可能不可访问，${count} 秒后自动跳转...`;
      statusEl.textContent = `倒计时：${count}`;

      if (count === 0) {
        window.location.href = targetUrl; // 强制跳转
        return;
      }

      count--;
      setTimeout(update, 1000);
    }

    update();
  }

  openBtn.addEventListener("click", function (e) {
    e.preventDefault();
    jumpNow();
  });

  copyBtn.addEventListener("click", async function () {
    try {
      await navigator.clipboard.writeText(targetUrl);
      statusEl.textContent = "链接已复制";
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = targetUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      statusEl.textContent = "链接已复制";
    }
  });

  // 启动流程
  jumpNow();        // 先尝试一次
  startCountdown(); // 再倒计时强制跳
</script>
</body>
</html>
