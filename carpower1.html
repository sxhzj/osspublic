<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>充电时间计算器</title>
<style>
:root{
  --bg1:#07111f;
  --bg2:#0b1730;
  --card:#0f1b2f;
  --card2:#13233d;
  --line:rgba(255,255,255,.08);
  --text:#eaf2ff;
  --muted:#9fb0c6;
  --accent:#4ea1ff;
  --accent2:#6c7dff;
  --good:#35d07f;
  --warn:#ffb74d;
  --shadow:0 10px 30px rgba(0,0,0,.28);
}

*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
}

.container{
  height:100dvh;
  padding:8px;
  display:flex;
  align-items:stretch;
  justify-content:center;
}

.card{
  width:min(100%,460px);
  height:100%;
  display:grid;
  grid-template-rows:auto auto auto 1fr auto;
  gap:8px;
  padding:10px;
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
  box-shadow:var(--shadow);
  overflow:hidden;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.title{
  font-size:clamp(16px,4vw,19px);
  font-weight:800;
  line-height:1.15;
}

.sub{
  margin-top:4px;
  font-size:11px;
  color:var(--muted);
  line-height:1.35;
}

.badge{
  font-size:11px;
  padding:6px 8px;
  border-radius:999px;
  background:rgba(78,161,255,.12);
  border:1px solid rgba(78,161,255,.22);
  color:#cfe4ff;
  white-space:nowrap;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  align-items:end;
}

.full{grid-column:1 / -1}

label{
  font-size:11px;
  color:var(--muted);
  display:block;
  margin:0 0 5px 0;
}

input[type="number"]{
  width:100%;
  border:none;
  outline:none;
  color:var(--text);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:10px 11px;
  font-size:15px;
}

.sliderBox{
  padding:8px 9px 9px;
  border-radius:12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
}

.sliderTop{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  color:#d6e3f4;
  margin-bottom:4px;
}

.sliderTop span{
  color:var(--accent);
  font-weight:700;
}

input[type="range"]{
  width:100%;
  margin:0;
  accent-color:var(--accent);
}

.actions{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}

button{
  border:none;
  outline:none;
  border-radius:12px;
  padding:11px 14px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.btn{
  color:#03111e;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 8px 20px rgba(78,161,255,.25);
}

.btn:active{transform:translateY(1px)}

.tip{
  font-size:11px;
  color:var(--muted);
  text-align:right;
  line-height:1.35;
}

.results{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
  align-content:start;
}

.panel{
  padding:9px 10px;
  border-radius:12px;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
  border:1px solid var(--line);
  min-height:62px;
}

.panel.big{
  grid-column:1 / -1;
}

.panelTitle{
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
}

.panelValue{
  font-size:18px;
  font-weight:900;
  line-height:1.1;
  word-break:break-word;
}

.panelValue.small{
  font-size:14px;
  font-weight:800;
}

.kv{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  padding:6px 0;
  border-bottom:1px dashed rgba(255,255,255,.08);
  line-height:1.25;
}

.kv:last-child{border-bottom:none}

.footer{
  font-size:11px;
  color:var(--muted);
  text-align:center;
  line-height:1.35;
  padding-top:2px;
}

.errorBar{
  position:fixed;
  left:8px;
  right:8px;
  bottom:10px;
  z-index:999;
  display:none;
  padding:9px 10px;
  border-radius:10px;
  background:#ffecec;
  color:#7a1d1d;
  font-size:13px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

@media (max-width:390px){
  .card{padding:9px; gap:7px; border-radius:14px;}
  input[type="number"]{padding:9px 10px; font-size:14px;}
  .panelValue{font-size:16px;}
  .panel{min-height:56px; padding:8px 9px;}
  .footer{font-size:10px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div>
        <div class="title">🔋 充电时间计算器</div>
        <div class="sub">按 52.3 度电车型估算，续航基于 21% = 50km、100% = 240km 线性插值。</div>
      </div>
      <div class="badge">手机一屏版</div>
    </div>

    <form id="calcForm" class="form">
      <div>
        <label for="capacity">电池总容量 (kWh)</label>
        <input type="number" id="capacity" step="0.1" min="0.1" value="52.3" required>
      </div>
      <div>
        <label for="power">充电功率 (kW)</label>
        <input type="number" id="power" step="0.1" min="0.1" value="6.0" required>
      </div>

      <div>
        <label for="currentInput">当前电量 (%)</label>
        <input type="number" id="currentInput" step="0.1" min="0" max="100" value="20">
      </div>
      <div>
        <label for="targetInput">目标电量 (%)</label>
        <input type="number" id="targetInput" step="0.1" min="0" max="100" value="100">
      </div>

      <div class="full sliderBox">
        <div class="sliderTop">
          <div>当前电量 <span id="currentValue">20%</span></div>
          <div>目标电量 <span id="targetValue">100%</span></div>
        </div>
        <input id="currentRange" type="range" min="0" max="100" step="1" value="20">
        <input id="targetRange" type="range" min="0" max="100" step="1" value="100" style="margin-top:8px">
      </div>

      <div class="full actions">
        <button class="btn" type="submit">计算</button>
        <div class="tip">输入后点计算<br>结果会直接显示在下面</div>
      </div>
    </form>

    <div id="results" class="results">
      <div class="panel">
        <div class="panelTitle">当前电量可开公里数</div>
        <div id="currentKm" class="panelValue">-- km</div>
      </div>
      <div class="panel">
        <div class="panelTitle">目标电量可开公里数</div>
        <div id="targetKm" class="panelValue">-- km</div>
      </div>

      <div class="panel">
        <div class="panelTitle">需要补电量</div>
        <div id="needKwh" class="panelValue">-- kWh</div>
      </div>
      <div class="panel">
        <div class="panelTitle">需要充电时长</div>
        <div id="needTime" class="panelValue">--</div>
      </div>

      <div class="panel big">
        <div class="panelTitle">详细信息</div>
        <div id="detailBox">
          <div class="kv"><div>电池容量</div><div>52.30 kWh</div></div>
          <div class="kv"><div>当前电量</div><div>20.0 %</div></div>
          <div class="kv"><div>目标电量</div><div>100.0 %</div></div>
          <div class="kv"><div>充电功率</div><div>6.00 kW</div></div>
          <div class="kv"><div>预计到达目标</div><div>--</div></div>
        </div>
      </div>
    </div>

    <div class="footer">当前续航估算：按你提供的两组数据插值计算。页面已压缩为手机单屏布局。</div>
  </div>
</div>

<div id="errorBar" class="errorBar"></div>

<script>
  function refreshAll() {
  syncInputs();
  calculate();
}
const capacityInput = document.getElementById('capacity');
const powerInput = document.getElementById('power');
const currentInput = document.getElementById('currentInput');
const targetInput = document.getElementById('targetInput');
const currentRange = document.getElementById('currentRange');
const targetRange = document.getElementById('targetRange');
const currentValue = document.getElementById('currentValue');
const targetValue = document.getElementById('targetValue');

const currentKm = document.getElementById('currentKm');
const targetKm = document.getElementById('targetKm');
const needKwh = document.getElementById('needKwh');
const needTime = document.getElementById('needTime');
const detailBox = document.getElementById('detailBox');
const errorBar = document.getElementById('errorBar');

const BASE_LOW_PERCENT = 21;
const BASE_LOW_KM = 50;
const BASE_HIGH_PERCENT = 100;
const BASE_HIGH_KM = 240;

function clamp(v, min, max) {
  return Math.min(max, Math.max(min, v));
}

function fmt1(v) {
  return Number(v).toFixed(1);
}

function fmt2(v) {
  return Number(v).toFixed(2);
}

function fmtKm(v) {
  return `${Math.round(v)} km`;
}

function formatDuration(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h}时 ${m}分 ${s}秒`;
}

function showError(msg) {
  errorBar.textContent = msg;
  errorBar.style.display = 'block';
  clearTimeout(showError._timer);
  showError._timer = setTimeout(() => {
    errorBar.style.display = 'none';
  }, 2500);
}

function estimateRangeKm(percent) {
  const p = Number(percent);
  if (!isFinite(p)) return NaN;
  const kmPerPercent = (BASE_HIGH_KM - BASE_LOW_KM) / (BASE_HIGH_PERCENT - BASE_LOW_PERCENT);
  return BASE_LOW_KM + (p - BASE_LOW_PERCENT) * kmPerPercent;
}

function updateSliderLabels() {
  currentValue.textContent = `${fmt1(currentInput.value)}%`;
  targetValue.textContent = `${fmt1(targetInput.value)}%`;
}

function syncInputs() {
  let c = parseFloat(currentInput.value);
  let t = parseFloat(targetInput.value);

  if (!isFinite(c)) c = 0;
  if (!isFinite(t)) t = 0;

  c = clamp(c, 0, 100);
  t = clamp(t, 0, 100);

  currentInput.value = c;
  targetInput.value = t;
  currentRange.value = Math.round(c);
  targetRange.value = Math.round(t);

  updateSliderLabels();
}

currentRange.addEventListener('input', function () {
  currentInput.value = this.value;
  refreshAll();
});

targetRange.addEventListener('input', function () {
  targetInput.value = this.value;
  refreshAll();
});

currentInput.addEventListener('input', refreshAll);
targetInput.addEventListener('input', refreshAll);

// 这两个你原来没加（很关键）
capacityInput.addEventListener('input', calculate);
powerInput.addEventListener('input', calculate);
  
function calculate() {
  const capacity = parseFloat(capacityInput.value);
  const power = parseFloat(powerInput.value);
  const currentPercent = parseFloat(currentInput.value);
  const targetPercent = parseFloat(targetInput.value);

  const errors = [];
  if (!isFinite(capacity) || capacity <= 0) errors.push('电池容量必须大于 0。');
  if (!isFinite(power) || power <= 0) errors.push('充电功率必须大于 0。');
  if (!isFinite(currentPercent) || currentPercent < 0 || currentPercent > 100) errors.push('当前电量应在 0~100 之间。');
  if (!isFinite(targetPercent) || targetPercent < 0 || targetPercent > 100) errors.push('目标电量应在 0~100 之间。');

  if (errors.length) {
    showError(errors.join('；'));
    return;
  }

  const now = new Date();
  const currentRangeKm = estimateRangeKm(currentPercent);
  const targetRangeKm = estimateRangeKm(targetPercent);

  const neededKwh = capacity * Math.max(0, (targetPercent - currentPercent) / 100);
  const seconds = neededKwh <= 0 ? 0 : (neededKwh / power) * 3600;
  const finishTime = new Date(now.getTime() + seconds * 1000);

  currentKm.textContent = fmtKm(currentRangeKm);
  targetKm.textContent = fmtKm(targetRangeKm);
  needKwh.textContent = `${neededKwh.toFixed(3)} kWh`;
  needTime.textContent = seconds <= 0 ? '无需充电' : formatDuration(seconds);

  detailBox.innerHTML = `
    <div class="kv"><div>电池容量</div><div>${fmt2(capacity)} kWh</div></div>
    <div class="kv"><div>当前电量</div><div>${fmt1(currentPercent)} %</div></div>
    <div class="kv"><div>目标电量</div><div>${fmt1(targetPercent)} %</div></div>
    <div class="kv"><div>当前可开</div><div>${fmtKm(currentRangeKm)}</div></div>
    <div class="kv"><div>目标可开</div><div>${fmtKm(targetRangeKm)}</div></div>
    <div class="kv"><div>充电功率</div><div>${fmt2(power)} kW</div></div>
    <div class="kv"><div>预计到达目标</div><div>${seconds <= 0 ? '无需充电' : finishTime.toLocaleString('zh-CN', { hour12:false })}</div></div>
  `;
}

document.getElementById('calcForm').addEventListener('submit', function (e) {
  e.preventDefault();
  calculate();
});

window.addEventListener('load', () => {
  syncInputs();
  calculate();
});
</script>
</body>
</html>
